server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: learning-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      ssl:
        enabled: ${REDIS_SSL:false}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS}

groq:
  api-keys: 
    - ${GROQ_API_KEY1}
    - ${GROQ_API_KEY2}
    - ${GROQ_API_KEY3}
    - ${GROQ_API_KEY4}
  model: ${CLAUDE_MODEL}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

scraper:
  service:
    url: ${SCRAPER_SERVICE_URL:http://localhost:8001}

rate-limit:
  ai:
    per-minute: 20
    per-day: 200
  scrape:
    per-minute: 5
  quiz:
    per-minute: 60
  general:
    per-minute: 200

logging:
  level:
    com.learningai: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG