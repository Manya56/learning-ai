name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x backened/gradlew

      - name: Build with Gradle
        working-directory: backened
        run: ./gradlew build -x test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/learningai
          DB_USER: postgres
          DB_PASSWORD: testpassword
          DB_NAME: learningai
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: testpassword
          JWT_SECRET: test_secret_key_minimum_64_characters_long_for_testing_purposes_only
          JWT_EXPIRY_MS: 86400000
          JWT_REFRESH_EXPIRY_MS: 604800000
          GROQ_API_KEY1: test_key
          GROQ_API_KEY2: test_key
          GROQ_API_KEY3: test_key
          GROQ_API_KEY4: test_key
          CLAUDE_MODEL: llama-3.3-70b-versatile
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: testpassword
          EMBEDDING_SERVICE_URL: http://localhost:8002
          SCRAPER_SERVICE_URL: http://localhost:8001

      - name: Check for secrets accidentally committed
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
        if: github.event_name == 'push'

  lint-python:
    name: Lint Python Services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint embedding service
        run: flake8 embeddings/main.py --max-line-length=120 --ignore=E501,W503
        continue-on-error: true

      - name: Lint scraper service
        run: flake8 scraper-service/main.py --max-line-length=120 --ignore=E501,W503
        continue-on-error: true